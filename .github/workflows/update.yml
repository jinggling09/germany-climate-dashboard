name: Update UBA emission data

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch latest UBA data
        run: python update_data.py
      - name: Commit if data changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Auto-update UBA emission data ($(date +%F))"
            git push
          else
            echo "No changes in data.json."
          fi

